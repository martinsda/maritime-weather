name: Daily Maritime Briefing

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 11:00 Lisbon (winter) / 12:00 (summer WEST)
  workflow_dispatch:        # allow manual run from GitHub Actions tab

permissions:
  contents: write           # commit generated files back to repo
  pages: write              # deploy to GitHub Pages
  id-token: write           # required by deploy-pages

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate briefing
        run: node scripts/generate-briefing.js
        env:
          WINDY_API_KEY:       ${{ secrets.WINDY_API_KEY }}
          STORMGLASS_API_KEY:  ${{ secrets.STORMGLASS_API_KEY }}
          SMTP_HOST:           ${{ secrets.SMTP_HOST }}
          SMTP_PORT:           ${{ secrets.SMTP_PORT }}
          SMTP_USER:           ${{ secrets.SMTP_USER }}
          SMTP_PASS:           ${{ secrets.SMTP_PASS }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}

      - name: Commit generated files to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "briefing: auto-generated ${{ github.run_id }}"
          file_pattern: "output/*.md index.html"
          commit_user_name: "Maritime Bot"
          commit_user_email: "actions@github.com"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'           # serve from repo root (index.html + output/)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
